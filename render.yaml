services:
  # Backend API
  - type: web
    name: ebook-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLIENT_URL
        value: https://guide.prateek.africa
      - key: PDF_URL
        value: https://guide.prateek.africa/api/pdf/download
      - key: PORT
        value: 4000

  # Frontend (static site)
  - type: web
    name: ebook-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ebook-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
